name: backend-ci

on:
  push:
    paths:
      - 'devb/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'devb/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: devb/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # Race detector. CGO is available on Linux runners, so -race works here
      # even when developers on Windows machines can't run it locally.
      - name: go test -race
        run: go test -race -count=1 ./...
        timeout-minutes: 10

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: '2025.1'
          working-directory: devb
          install-go: false

  load-smoke:
    # Manually dispatched: runs the native Go load harness against a target URL.
    # Keeps CI minutes free while still giving one-click access to the rig.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: devb/go.sum
      - name: smoke test
        run: go run ./smoketest -base=${{ secrets.STAGING_URL }}
      - name: load test (gentle)
        run: go run ./loadtest -base=${{ secrets.STAGING_URL }} -users=50 -rps=100 -duration=60s
