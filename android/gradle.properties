# Right-sized for a 4 GB RAM dev box. -Xmx8G + MaxMetaspaceSize=4G in the
# previous config asked the OS for 12 GB on a laptop with ~3 GB usable,
# causing the Gradle daemon JVM to OOM-crash on first build. 1536m heap
# is the realistic ceiling on this hardware (Windows + Chrome + VS Code
# typically eat the rest), and 512m metaspace is plenty for the AGP +
# Kotlin compiler. Bump these back up if you move to a higher-RAM
# machine — modern Android builds compile faster with more heap.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Memory-pressure-aware defaults. parallel=false trades a bit of build
# wall time for a smaller working-set (modules build one at a time
# instead of competing for the heap). configureondemand keeps Gradle
# from configuring sub-projects we don't need to touch. caching makes
# the SECOND build dramatically faster than the first.
org.gradle.parallel=false
org.gradle.daemon=true
org.gradle.caching=true
org.gradle.configureondemand=true

android.useAndroidX=true
android.builtInKotlin=true
android.newDsl=true
